name: Daily Leilão Scrape

on:
  schedule:
    # Run at 8:00 AM Brasilia time (11:00 AM UTC) every day
    - cron: '0 11 * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write  # Allow pushing commits
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      
      - name: Install dependencies
        run: bun install
      
      - name: Configure git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
      
      - name: Run daily scraper
        run: bun run scripts/run-daily.ts
        env:
          TZ: America/Sao_Paulo
      
      # Git commit + push is handled by run-daily.ts
      # This step only runs if the script didn't push (fallback)
      - name: Push changes (fallback)
        if: failure()
        run: |
          git add .
          git commit -m "Update: $(date +%Y-%m-%d) - automated scrape" || echo "No changes to commit"
          git push origin main || echo "Push failed"
